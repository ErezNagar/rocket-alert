name: Test and Build

on:
  push:
    branches:
      - master

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2

      - name: Install
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build 🔧
        run: npm run build

