name: CI + Release

on:
  pull_request:
    branches:
      - master

  push:
    branches:
      - master

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Install
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build 🔧
        run: npm run build

  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    concurrency:
      group: pages-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Install
        run: npm ci

      - name: Build Preview 🔧
        run: BASE_PATH=/preview/ npm run build

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy Preview 🚧
        run: |
          npm install -g gh-pages

          mkdir preview
          cp -r dist/* preview/

          gh-pages -d preview \
            -r https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git \
            -b gh-pages \
            -m "Deploy preview from PR #${{ github.event.pull_request.number }}" \
            --dest preview
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment PR with preview URL 💬
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/preview/`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚧 Preview deployed: ${url}`
            });

  release:
    needs: test-and-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    concurrency:
      group: pages-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - run: npm ci

      - run: BASE_PATH=/ npm run build

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy 🚀
        run: |
          npm install -g gh-pages
          gh-pages -d dist \
            -r https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
